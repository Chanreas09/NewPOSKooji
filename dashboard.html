<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOOJI BOSS Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f1214;
            color: #edede9;
            padding: 20px;
        }
        h1 { margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        .live-badge {
            background: #e63946;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a1d20;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2a2e33;
        }
        .stat-label { font-size: 0.85rem; color: #a8a89e; margin-bottom: 8px; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #52b788; }
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 800px) { .dashboard-grid { grid-template-columns: 1fr; } }
        .orders-panel, .chart-panel {
            background: #1a1d20;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #2a2e33;
        }
        .orders-panel h3, .chart-panel h3 { margin-bottom: 16px; font-size: 1rem; color: #a8a89e; }
        .orders-list { max-height: 500px; overflow-y: auto; }
        .order-item {
            border-bottom: 1px solid #2a2e33;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .order-item:hover { background: #24282c; }
        .order-id { font-weight: bold; font-size: 0.9rem; }
        .order-customer { font-size: 0.7rem; color: #a8a89e; }
        .order-total { font-weight: bold; color: #52b788; }
        .order-time { font-size: 0.7rem; color: #6c6c64; }
        .empty-orders { text-align: center; padding: 40px; color: #6c6c64; }
        .refresh-btn {
            background: #2d6a4f;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            margin-bottom: 16px;
        }
        .refresh-btn:hover { background: #40916c; }
        .footer { margin-top: 20px; text-align: center; font-size: 0.7rem; color: #6c6c64; }
    </style>
</head>
<body>
    <h1>👑 KOOJI BOSS Dashboard <span class="live-badge">LIVE</span></h1>
    
    <div class="stats">
        <div class="stat-card"><div class="stat-label">💰 Today's Revenue</div><div class="stat-value" id="todayRevenue">៛ 0</div></div>
        <div class="stat-card"><div class="stat-label">📋 Today's Orders</div><div class="stat-value" id="todayOrders">0</div></div>
        <div class="stat-card"><div class="stat-label">🕐 Last Order</div><div class="stat-value" id="lastOrderTime">-</div></div>
    </div>
    
    <div class="dashboard-grid">
        <div class="orders-panel">
            <h3>📦 Live Orders <span id="orderCount"></span></h3>
            <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
            <div class="orders-list" id="ordersList"><div class="empty-orders">Loading...</div></div>
        </div>
        <div class="chart-panel">
            <h3>📊 Today's Revenue Trend</h3>
            <canvas id="revenueChart"></canvas>
        </div>
    </div>
    <div class="footer">Last updated: <span id="lastUpdated">-</span> | Real-time sync</div>

    <script>
        const SUPABASE_URL = "https://vetldvkdryroeagntnc.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_REdJ2fxwd5SOr7t_hTDTgA_j2zTQfgr";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let revenueChart = null;

        function formatCurrency(amount) { return `៛ ${amount.toLocaleString()}`; }
        function formatTime(dateString) { return new Date(dateString).toLocaleTimeString(); }

        async function loadData() {
            const today = new Date().toISOString().split('T')[0];
            
            // Load stats
            const { data: stats } = await supabase.from('daily_stats').select('*').eq('date', today).maybeSingle();
            if (stats) {
                document.getElementById('todayRevenue').innerHTML = formatCurrency(stats.revenue || 0);
                document.getElementById('todayOrders').innerText = stats.orders_count || 0;
            }
            
            // Load orders
            const { data: orders } = await supabase.from('orders').select('*').order('created_at', { ascending: false }).limit(50);
            const container = document.getElementById('ordersList');
            document.getElementById('orderCount').innerText = `(${orders?.length || 0})`;
            
            if (!orders || orders.length === 0) {
                container.innerHTML = '<div class="empty-orders">📭 No orders yet</div>';
                return;
            }
            
            if (orders[0]) document.getElementById('lastOrderTime').innerHTML = formatTime(orders[0].created_at);
            
            container.innerHTML = orders.map(order => `
                <div class="order-item">
                    <div><div class="order-id">${order.order_id}</div><div class="order-customer">${order.customer_name || 'Guest'} • ${order.order_type || 'Dine In'}</div></div>
                    <div style="text-align:right;"><div class="order-total">${formatCurrency(order.total)}</div><div class="order-time">${formatTime(order.created_at)}</div></div>
                </div>
            `).join('');
            
            // Chart data
            const { data: todayOrders } = await supabase.from('orders').select('total, created_at').gte('created_at', today);
            const hourlyData = Array(24).fill(0);
            todayOrders?.forEach(order => { const hour = new Date(order.created_at).getHours(); hourlyData[hour] += order.total; });
            
            if (revenueChart) { revenueChart.data.datasets[0].data = hourlyData; revenueChart.update(); }
            else {
                revenueChart = new Chart(document.getElementById('revenueChart').getContext('2d'), {
                    type: 'line',
                    data: { labels: Array.from({length:24},(_,i)=>`${i}:00`), datasets: [{ label: 'Revenue (៛)', data: hourlyData, borderColor: '#52b788', fill: true, tension: 0.3 }] },
                    options: { responsive: true, maintainAspectRatio: true }
                });
            }
            document.getElementById('lastUpdated').innerText = new Date().toLocaleTimeString();
        }

        // Real-time subscription
        supabase.channel('dashboard').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'orders' }, () => { loadData(); }).subscribe();
        
        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
